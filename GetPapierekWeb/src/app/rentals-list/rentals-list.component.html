<div class="rentals-list-container">
    <h2>Lista wypożyczeń</h2>
    <input type="text" placeholder="Szukaj po książce, użytkowniku lub statusie..."
        [(ngModel)]="searchTerm" (ngModelChange)="onSearchChange()" class="search-input" />
    <table class="rentals-table">
        <thead>
            <tr>
                <th>Książka</th>
                <th>Użytkownik</th>
                <th>Data wypożyczenia</th>
                <th>Data zwrotu</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let rental of filteredRentals">
                <td>{{ rental.book?.title }}</td>
                <td>{{ rental.user?.name }}</td>
                <td>{{ rental.rentalDate | date:'yyyy-MM-dd' }}</td>
                <td>{{ rental.returnDate ? (rental.returnDate | date:'yyyy-MM-dd') : '-' }}</td>
                <td>{{ rental.status }}</td>
            </tr>
        </tbody>
    </table>
</div>
