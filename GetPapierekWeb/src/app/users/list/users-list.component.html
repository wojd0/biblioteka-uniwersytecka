<div class="users-list-container">
  <h2>Lista użytkowników</h2>
  <app-search-box [(value)]="searchTerm" label="Szukaj po imieniu, emailu lub roli..."
    (valueChange)="onSearchChange()">
  </app-search-box>
  <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z2 users-table">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Imię i nazwisko</th>
      <td mat-cell *matCellDef="let user">{{ user.name }}</td>
    </ng-container>
    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Email</th>
      <td mat-cell *matCellDef="let user">{{ user.email }}</td>
    </ng-container>
    <ng-container matColumnDef="role">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Rola</th>
      <td mat-cell *matCellDef="let user">{{ user.role }}</td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="['name','email','role']"></tr>
    <tr mat-row *matRowDef="let row; columns: ['name','email','role'];"></tr>
  </table>
</div>
